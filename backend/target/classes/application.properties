# ─── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ─── Supabase PostgreSQL ────────────────────────────────────────────────────────
# Replace YOUR_PROJECT_REF with your Supabase project reference (e.g. abcdefghijklmn)
# Replace YOUR_DB_PASSWORD with the database password from Supabase → Settings → Database
#
# Direct connection (port 5432) — use this for Spring Boot / Hibernate
spring.datasource.url=jdbc:postgresql://db.ukterctvbppimteejvfd.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=Shukan@5013942
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── HikariCP Connection Pool ─────────────────────────────────────────────────
# Supabase free tier allows max 60 direct connections — keep pool small
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
# Use 'validate' after running supabase_schema.sql — tables already exist
# Use 'update' only during initial setup if skipping the SQL script
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# ─── JWT ───────────────────────────────────────────────────────────────────────
# Generate a strong secret: openssl rand -base64 64
app.jwt.secret=REPLACE_WITH_A_STRONG_64_BYTE_BASE64_SECRET_KEY_FOR_PRODUCTION_USE_ONLY
app.jwt.expiry-ms=86400000

# ─── OTP ───────────────────────────────────────────────────────────────────────
app.otp.expiry-seconds=300
app.otp.max-attempts=3
# Set true to bypass OTP verification (use until SMS gateway is purchased)
# Fixed OTP code when bypass=true: 000000
app.otp.bypass=true

# ─── File Upload ───────────────────────────────────────────────────────────────
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ─── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:4173

# ─── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.rsquare=INFO
logging.level.org.springframework.security=WARN
